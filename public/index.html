<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>自选股行情</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0d1117;color:#e6edf3;min-height:100vh;-webkit-text-size-adjust:100%}
header{background:#161b22;border-bottom:1px solid #30363d;padding:14px 24px;display:flex;align-items:center;gap:16px}
header h1{font-size:18px;font-weight:600;letter-spacing:.5px}
.refresh-setting{display:flex;align-items:center;gap:6px;color:#8b949e;font-size:11px;white-space:nowrap}
.refresh-interval-select,.market-row-select{appearance:none;background:#161b22;border:1px solid #30363d;border-radius:5px;color:#c9d1d9;padding:4px 24px 4px 8px;font-size:11px;outline:none;cursor:pointer;background-image:linear-gradient(45deg,transparent 50%,#8b949e 50%),linear-gradient(135deg,#8b949e 50%,transparent 50%);background-position:calc(100% - 11px) 9px,calc(100% - 7px) 9px;background-size:4px 4px,4px 4px;background-repeat:no-repeat}
.refresh-interval-select:focus,.market-row-select:focus{border-color:#58a6ff}
.status{margin-left:auto;font-size:12px;color:#8b949e;display:flex;align-items:center;gap:6px}
.dot{width:8px;height:8px;border-radius:50%;background:#3fb950}
.dot.offline{background:#f85149}
.main{padding:24px;max-width:1100px;margin:0 auto}
.market-overview{margin-bottom:24px}
.market-overview-head{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;margin-bottom:10px}
.market-kicker{color:#58a6ff;font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:3px}
.market-title{font-size:17px;font-weight:650;letter-spacing:.2px}
.market-summary{color:#8b949e;font-size:12px;text-align:right;line-height:1.5}
.market-summary strong{font-weight:600;color:#c9d1d9}
.market-toolbar{display:flex;align-items:center;justify-content:space-between;gap:12px;margin:-1px 0 10px;color:#6e7681;font-size:11px}
.market-order-note{display:flex;align-items:center;gap:5px;min-width:0}
.market-row-setting{display:flex;align-items:center;gap:6px;white-space:nowrap}
.market-grid{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:8px}
.market-card{--accent:#8b949e;position:relative;overflow:hidden;min-width:0;background:linear-gradient(145deg,#1a2028,#161b22 68%);border:1px solid #30363d;border-radius:8px;padding:11px 12px 10px;transition:border-color .15s,transform .15s}
.market-card::before{content:"";position:absolute;left:0;right:0;top:0;height:2px;background:var(--accent);opacity:.78}
.market-card:hover{border-color:#484f58;transform:translateY(-1px)}
.market-card.up{--accent:#f85149}.market-card.down{--accent:#3fb950}
#market-grid.market-colors-off .market-card{--accent:#8b949e;color:#e6edf3}
#market-grid.market-colors-off .market-pct{color:#e6edf3}
.market-card-top{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:7px}
.market-name{font-size:12px;font-weight:600;color:#c9d1d9;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.market-card-actions{display:flex;align-items:center;gap:4px;flex:none}
.market-region{flex:none;border:1px solid #30363d;border-radius:3px;color:#6e7681;font-size:9px;font-weight:700;line-height:16px;padding:0 4px;letter-spacing:.3px}
.market-drag-handle{display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;margin-right:-4px;background:none;border:0;border-radius:3px;color:#6e7681;font-size:13px;line-height:1;cursor:grab;touch-action:none;user-select:none}
.market-drag-handle:hover,.market-drag-handle:focus-visible{color:#58a6ff;background:#21262d;outline:none}
.market-card.sorting-source{opacity:.3;transform:none}
.market-card.drop-before{box-shadow:inset 3px 0 #58a6ff}
.market-card.drop-after{box-shadow:inset -3px 0 #58a6ff}
.market-drag-ghost{position:fixed;z-index:500;pointer-events:none;display:flex;align-items:center;gap:8px;min-width:155px;padding:9px 12px;border-radius:7px;border:1px solid #58a6ff;background:#1c2128;color:#e6edf3;box-shadow:0 12px 30px rgba(0,0,0,.5);font-size:12px;transform:translate(12px,12px)}
body.market-sorting,body.market-sorting *{cursor:grabbing!important;user-select:none!important}
.market-price-row{display:flex;align-items:baseline;justify-content:space-between;gap:8px}
.market-price{font:600 18px/1.2 ui-monospace,SFMono-Regular,Menlo,monospace;color:#e6edf3;letter-spacing:-.35px}
.market-pct{font:600 12px/1 ui-monospace,SFMono-Regular,Menlo,monospace;white-space:nowrap}
.market-change{height:18px;margin-top:2px;color:#8b949e;font:10px/18px ui-monospace,SFMono-Regular,Menlo,monospace}
.market-range{margin-top:4px}
.market-range-bar{height:3px;border-radius:3px;background:#30363d;overflow:hidden}
.market-range-fill{height:100%;border-radius:inherit;background:var(--accent);opacity:.82}
.market-range-labels{display:flex;justify-content:space-between;margin-top:4px;color:#6e7681;font:9px/1.2 ui-monospace,SFMono-Regular,Menlo,monospace}
.market-card-loading{min-height:110px;display:flex;align-items:center;justify-content:center;color:#6e7681;font-size:11px}
.market-card-loading::after{content:"";width:13px;height:13px;margin-left:7px;border:2px solid #30363d;border-top-color:#58a6ff;border-radius:50%;animation:market-spin .8s linear infinite}
.market-overview-actions{display:none;justify-content:center;margin-top:10px}
.market-overview-actions.visible{display:flex}
.market-expand-btn{background:#161b22;border:1px solid #30363d;border-radius:6px;color:#8b949e;padding:6px 14px;font-size:11px;cursor:pointer;transition:color .15s,border-color .15s,background .15s}
.market-expand-btn:hover{color:#e6edf3;border-color:#484f58;background:#1c2128}
.market-expand-icon{display:inline-block;margin-left:5px;transition:transform .15s}
.market-expand-btn[aria-expanded="true"] .market-expand-icon{transform:rotate(180deg)}
@keyframes market-spin{to{transform:rotate(360deg)}}
@media (max-width:980px){
  .market-grid{grid-template-columns:repeat(5,176px);overflow-x:auto;scroll-snap-type:x proximity;scrollbar-width:none;padding-bottom:2px}
  .market-grid::-webkit-scrollbar{display:none}
  .market-card{scroll-snap-align:start}
}
@media (max-width:768px){
  .main{padding:12px}
  header{padding:10px 12px;flex-wrap:wrap}
  header h1{font-size:16px}
  .refresh-setting{font-size:10px}
  .status{font-size:11px}
  .market-overview{margin-bottom:20px}
  .market-overview-head{align-items:flex-start;margin-bottom:8px}
  .market-title{font-size:15px}
  .market-summary{max-width:180px;font-size:10px}
  .market-toolbar{font-size:10px;margin-bottom:8px}
  .search-row{flex-direction:column;align-items:stretch}
  .search-wrap{width:100%}
  .search-row .add-btn,.search-row .refresh-btn{width:100%}
  .table-wrapper{overflow-x:auto;-webkit-overflow-scrolling:touch;border:1px solid #30363d;border-radius:8px}
  .table-wrapper::-webkit-scrollbar{height:10px}
  .table-wrapper::-webkit-scrollbar-track{background:#21262d}
  .table-wrapper::-webkit-scrollbar-thumb{background:#30363d;border-radius:5px}
  .table-wrapper::-webkit-scrollbar-thumb:hover{background:#484f58}
  table{font-size:11px;border:none;min-width:860px}
  th,td{padding:6px 4px;font-size:11px;white-space:nowrap}
  th:first-child,td:first-child{position:sticky;left:0;background:#1c2128;z-index:2}
  th:nth-child(2),td:nth-child(2){position:sticky;left:70px;background:#1c2128;z-index:2}
  tbody td:first-child{background:#161b22}
  tbody td:nth-child(2){background:#161b22}
  tbody tr:hover td:first-child,tbody tr:hover td:nth-child(2){background:#1c2128}
}
.search-row{display:flex;gap:8px;margin-bottom:20px;align-items:flex-start}
.search-wrap{position:relative;width:320px}
.search-wrap input{width:100%;background:#21262d;border:1px solid #30363d;border-radius:6px;color:#e6edf3;padding:8px 32px 8px 12px;font-size:14px;outline:none;transition:border-color .15s}
.search-wrap input:focus{border-color:#58a6ff}
.search-wrap input::placeholder{color:#6e7681}
.search-clear{position:absolute;right:8px;top:50%;transform:translateY(-50%);background:none;border:none;color:#6e7681;cursor:pointer;font-size:16px;line-height:1;display:none}
.search-clear.visible{display:block}
.add-btn{background:#238636;border:none;border-radius:6px;color:#fff;padding:8px 16px;font-size:14px;cursor:pointer;white-space:nowrap;transition:background .15s,opacity .15s;opacity:.4;pointer-events:none}
.add-btn.ready{opacity:1;pointer-events:auto}
.add-btn.ready:hover{background:#2ea043}
.dropdown{position:absolute;top:calc(100% + 4px);left:0;right:0;background:#21262d;border:1px solid #30363d;border-radius:6px;overflow:hidden;z-index:100;box-shadow:0 8px 24px rgba(0,0,0,.4);display:none}
.dropdown.open{display:block}
.dd-item{display:flex;align-items:center;gap:10px;padding:9px 12px;cursor:pointer;font-size:13px;transition:background .1s}
.dd-item:hover,.dd-item.active{background:#2d333b}
.dd-item.selected{background:#1f3a5f}
.dd-name{flex:1;font-weight:500}
.dd-code{color:#8b949e;font-size:12px;font-family:monospace}
.dd-empty{padding:12px;color:#6e7681;font-size:13px;text-align:center}
.dd-loading{padding:12px;color:#8b949e;font-size:13px;text-align:center}
table{width:100%;border-collapse:collapse;background:#161b22;border-radius:8px;overflow:hidden;border:1px solid #30363d}
thead{background:#1c2128}
th{padding:10px 14px;text-align:right;font-size:12px;font-weight:600;color:#8b949e;white-space:nowrap}
th:first-child,th:nth-child(2){text-align:left}
td{padding:10px 14px;font-size:13px;text-align:right;border-top:1px solid #21262d;white-space:nowrap}
td:first-child,td:nth-child(2){text-align:left}
tr:hover td{background:#1c2128}
.up{color:#f85149}.down{color:#3fb950}.flat{color:#8b949e}
.del-btn{background:none;border:none;color:#6e7681;cursor:pointer;font-size:15px;padding:2px 6px;border-radius:4px;transition:color .15s,background .15s}
.del-btn:hover{color:#f85149;background:#21262d}
.market-tag{display:inline-block;font-size:10px;padding:1px 5px;border-radius:3px;font-weight:600;margin-right:4px;vertical-align:middle}
.tag-a{background:#1f3a5f;color:#79c0ff}
.tag-kcb{background:#34255a;color:#bc8cff}
.tag-cyb{background:#173d4a;color:#56d4dd}
.tag-hk{background:#3a2d1f;color:#e3b341}
.tag-us{background:#1f3d2f;color:#3fb950}
.empty{text-align:center;padding:60px;color:#6e7681;font-size:14px}
.refresh-btn{background:#21262d;border:1px solid #30363d;color:#e6edf3;border-radius:6px;padding:7px 14px;font-size:13px;cursor:pointer;transition:background .15s}
.refresh-btn:hover{background:#30363d}
.color-toggle[aria-pressed="false"]{color:#8b949e}
#stock-table.market-colors-off tbody .up,
#stock-table.market-colors-off tbody .down,
#stock-table.market-colors-off tbody .flat{color:inherit}
tbody tr.stock-row{cursor:pointer;transition:opacity .15s,background .15s}
tbody tr.stock-row.sorting-source{opacity:.3}
tbody tr.stock-row.drop-before td{box-shadow:inset 0 2px #58a6ff}
tbody tr.stock-row.drop-after td{box-shadow:inset 0 -2px #58a6ff}
.drag-handle{display:inline-flex;align-items:center;justify-content:center;width:18px;height:22px;margin-right:4px;color:#6e7681;cursor:grab;font-size:15px;font-weight:700;letter-spacing:-3px;vertical-align:middle;touch-action:none;user-select:none}
.drag-handle:hover{color:#58a6ff}
body.stock-sorting,body.stock-sorting *{cursor:grabbing!important;user-select:none!important}
.drag-ghost{position:fixed;z-index:500;pointer-events:none;display:flex;align-items:center;gap:10px;min-width:190px;padding:9px 14px;border-radius:7px;border:1px solid #58a6ff;background:#1c2128;color:#e6edf3;box-shadow:0 12px 30px rgba(0,0,0,.5);font-size:13px;transform:translate(12px,12px)}
.sort-note{display:flex;align-items:center;gap:6px;margin:-8px 0 10px;color:#6e7681;font-size:12px}
.sort-note .drag-handle{cursor:default;margin:0}
/* modal */
.modal-mask{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:200;display:none;align-items:center;justify-content:center}
.modal-mask.open{display:flex}
.modal{background:#161b22;border:1px solid #30363d;border-radius:10px;width:860px;max-width:96vw;max-height:92vh;overflow:auto;box-shadow:0 24px 64px rgba(0,0,0,.6)}
.modal-header{display:flex;align-items:flex-start;padding:18px 20px 0;gap:12px}
.modal-title{flex:1}
.modal-name{font-size:18px;font-weight:700}
.modal-sub{font-size:12px;color:#8b949e;margin-top:2px}
.modal-price{text-align:right}
.modal-price .price{font-size:26px;font-weight:700}
.modal-price .chg{font-size:13px;margin-top:2px}
.modal-close{background:none;border:none;color:#8b949e;font-size:20px;cursor:pointer;padding:0 4px;line-height:1;margin-top:-2px}
.modal-close:hover{color:#e6edf3}
.tab-bar{display:flex;gap:0;padding:12px 20px 0;border-bottom:1px solid #30363d}
.tab{padding:6px 14px;font-size:13px;cursor:pointer;border-bottom:2px solid transparent;color:#8b949e;transition:color .15s}
.tab.active{color:#58a6ff;border-bottom-color:#58a6ff}
.chart-area{padding:12px 20px 16px;min-height:410px;position:relative}
.period-bar{display:none;align-items:center;gap:6px;margin:-2px 0 8px;overflow-x:auto;scrollbar-width:none}
.period-bar.visible{display:flex}
.period-bar::-webkit-scrollbar{display:none}
.period-btn{flex:none;background:#21262d;border:1px solid #30363d;border-radius:4px;color:#8b949e;padding:3px 9px;font-size:11px;cursor:pointer;transition:color .15s,border-color .15s,background .15s}
.period-btn:hover{color:#e6edf3;border-color:#484f58}
.period-btn.active{color:#58a6ff;border-color:#1f6feb;background:#1f3a5f}
.chart-readout{min-height:38px;display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:6px}
.chart-info{display:flex;flex-wrap:wrap;align-items:center;gap:4px 12px;min-width:0;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:11px;color:#c9d1d9}
.chart-info span{white-space:nowrap}
.chart-info b{font-weight:500;color:#8b949e;margin-right:4px}
.chart-guide{flex:none;color:#6e7681;font-size:11px;white-space:nowrap;padding-top:1px}
#chart-canvas{display:block;width:100%;height:290px;border-radius:4px;cursor:crosshair;touch-action:none}
#chart-canvas.panning{cursor:grabbing}
.chart-window{display:none;margin-top:8px;user-select:none}
.chart-window.ready{display:block}
.chart-window-head{display:flex;align-items:center;gap:8px;min-height:22px;margin-bottom:4px;color:#6e7681;font-size:11px}
.chart-range-label{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.chart-window-btn{background:none;border:1px solid #30363d;border-radius:4px;color:#8b949e;padding:2px 7px;font-size:11px;cursor:pointer}
.chart-window-btn:hover{color:#e6edf3;border-color:#484f58}
.chart-range{position:relative;height:24px;border-radius:4px;background:#161b22;border:1px solid #30363d;cursor:pointer;touch-action:none}
.chart-range::before{content:"";position:absolute;left:0;right:0;top:10px;height:2px;background:#30363d}
.chart-range-selection{position:absolute;top:4px;height:14px;min-width:4px;border:1px solid #58a6ff;background:#1f6feb55;cursor:grab}
.chart-range-selection:active{cursor:grabbing}
.chart-range-handle{position:absolute;top:-5px;width:14px;height:22px;border:1px solid #79c0ff;border-radius:3px;background:#1f6feb;cursor:ew-resize;z-index:1}
.chart-range-handle.start{left:-7px}
.chart-range-handle.end{right:-7px}
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:#30363d;margin:0 20px 20px;border-radius:6px;overflow:hidden}
.stat-item{background:#1c2128;padding:10px 14px}
.stat-label{font-size:11px;color:#8b949e;margin-bottom:3px}
.stat-value{font-size:13px;font-weight:500}
.chart-loading{position:absolute;inset:52px 20px 16px;display:flex;align-items:center;justify-content:center;color:#8b949e;font-size:13px;background:#0d1117;border-radius:4px;z-index:2}
@media (max-width:600px){
  .modal-header{padding:14px 14px 0}
  .tab-bar{padding-left:14px}
  .tab{padding:6px 11px}
  .chart-area{padding:10px 12px 14px;min-height:420px}
  .chart-readout{min-height:54px}
  .chart-guide{display:none}
  .stats-grid{margin:0 12px 14px}
  .stat-item{padding:8px 10px}
}
</style>
</head>
<body>
<header>
  <h1>📈 自选股行情</h1>
  <button class="refresh-btn" type="button" onclick="refreshAll()">刷新</button>
  <label class="refresh-setting" for="refresh-interval">
    <span>自选刷新</span>
    <select class="refresh-interval-select" id="refresh-interval" title="自选股刷新间隔；全球指数固定每 5 秒刷新" onchange="setRefreshInterval(this.value)">
      <option value="1000">1 秒（高频）</option>
      <option value="3000">3 秒</option>
      <option value="5000" selected>5 秒</option>
      <option value="10000">10 秒</option>
      <option value="30000">30 秒</option>
      <option value="60000">60 秒</option>
    </select>
  </label>
  <div class="status"><span class="dot" id="dot"></span><span id="status-text">连接中...</span></div>
</header>
<div class="main">
  <section class="market-overview" aria-labelledby="market-title">
    <div class="market-overview-head">
      <div>
        <div class="market-kicker">Global Markets</div>
        <h2 class="market-title" id="market-title">全球市场概览</h2>
      </div>
      <div class="market-summary" id="market-summary" aria-live="polite">正在同步全球行情...</div>
    </div>
    <div class="market-toolbar">
      <div class="market-order-note"><span aria-hidden="true">⠿</span><span>拖动卡片右上角调整顺序 · 每 5 秒更新</span></div>
      <label class="market-row-setting" for="market-row-count">
        <span>默认显示</span>
        <select class="market-row-select" id="market-row-count" onchange="setMarketDefaultRows(this.value)">
          <option value="1">1 行</option>
          <option value="2" selected>2 行</option>
          <option value="3">3 行</option>
        </select>
      </label>
    </div>
    <div class="market-grid" id="market-grid">
      <div class="market-card market-card-loading">行情加载中</div>
    </div>
    <div class="market-overview-actions" id="market-overview-actions">
      <button class="market-expand-btn" id="market-expand-btn" type="button" aria-expanded="false" aria-controls="market-grid" onclick="toggleMarketExpansion()"></button>
    </div>
  </section>
  <div class="search-row">
    <div class="search-wrap">
      <input id="search-input" type="text" placeholder="搜索 A 股、港股、美股名称或代码..." autocomplete="off">
      <button class="search-clear" id="search-clear" onclick="clearSearch()">✕</button>
      <div class="dropdown" id="dropdown"></div>
    </div>
    <button class="add-btn" id="add-btn" onclick="confirmAdd()">添加自选</button>
    <button class="refresh-btn color-toggle" id="color-toggle" type="button" aria-pressed="true" onclick="toggleListColors()" title="切换股票列表和全球市场的涨跌颜色">🎨 行情颜色：开</button>
    <button class="refresh-btn" id="pip-btn" onclick="openFloatWindow()">📺 浮窗</button>
  </div>
  <div class="sort-note"><span class="drag-handle" aria-hidden="true">⠿</span>长按股票行后拖动，可调整自选股顺序</div>
  <div class="table-wrapper">
  <table id="stock-table">
    <thead>
      <tr>
        <th>代码</th><th>名称</th><th>最新价</th>
        <th>涨跌额</th><th>涨跌幅</th><th>今开</th>
        <th>昨收</th><th>最高</th><th>最低</th>
        <th>成交量(手)</th><th>成交额(万)</th><th>操作</th>
      </tr>
    </thead>
    <tbody id="tbody"><tr><td colspan="12" class="empty">暂无自选股，请添加</td></tr></tbody>
  </table>
</div>
</div>

<div class="modal-mask" id="modal-mask" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <div class="modal-header">
      <div class="modal-title">
        <div class="modal-name" id="m-name"></div>
        <div class="modal-sub" id="m-sub"></div>
      </div>
      <div class="modal-price">
        <div class="price" id="m-price"></div>
        <div class="chg" id="m-chg"></div>
      </div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="tab-bar">
      <div class="tab active" data-tab="minute" onclick="switchTab(this)">分时</div>
      <div class="tab" data-tab="minuteK" onclick="switchTab(this)">分时K</div>
      <div class="tab" data-tab="kline" onclick="switchTab(this)">K线</div>
    </div>
    <div class="chart-area">
      <div class="period-bar" id="period-bar" aria-label="分时 K 线周期">
        <button class="period-btn" data-period="m1" onclick="switchMinuteKPeriod('m1')">1分</button>
        <button class="period-btn active" data-period="m5" onclick="switchMinuteKPeriod('m5')">5分</button>
        <button class="period-btn" data-period="m15" onclick="switchMinuteKPeriod('m15')">15分</button>
        <button class="period-btn" data-period="m30" onclick="switchMinuteKPeriod('m30')">30分</button>
        <button class="period-btn" data-period="m60" onclick="switchMinuteKPeriod('m60')">60分</button>
      </div>
      <div class="chart-readout">
        <div class="chart-info" id="chart-info"></div>
        <div class="chart-guide">滚轮缩放 · 拖动平移</div>
      </div>
      <div class="chart-loading" id="chart-loading">加载中...</div>
      <canvas id="chart-canvas" height="290"></canvas>
      <div class="chart-window" id="chart-window">
        <div class="chart-window-head">
          <span class="chart-range-label" id="chart-range-label"></span>
          <button class="chart-window-btn" onclick="showAllChartData()">全部</button>
          <button class="chart-window-btn" onclick="resetChartViewport()">重置</button>
        </div>
        <div class="chart-range" id="chart-range" aria-label="图表时间范围">
          <div class="chart-range-selection" id="chart-range-selection">
            <span class="chart-range-handle start" data-edge="start" aria-label="调整开始时间"></span>
            <span class="chart-range-handle end" data-edge="end" aria-label="调整结束时间"></span>
          </div>
        </div>
      </div>
    </div>
    <div class="stats-grid" id="stats-grid"></div>
  </div>
</div>

<script>
const STORAGE_KEY = 'watchlist_v1';
const COLOR_STORAGE_KEY = 'stock_list_colors_v1';
const MARKET_ORDER_STORAGE_KEY = 'global_market_order_v1';
const MARKET_ROWS_STORAGE_KEY = 'global_market_rows_v1';
const REFRESH_INTERVAL_STORAGE_KEY = 'stock_refresh_interval_v1';
const REFRESH_INTERVAL_OPTIONS = [1000,3000,5000,10000,30000,60000];
const GLOBAL_MARKET_REFRESH_INTERVAL = 5000;
const MARKET_CARDS_PER_ROW = 5;
const DEFAULT_STOCKS = ['sh600519','sz000001','hk00700','usAAPL'];
const MARKET_INDEXES = [
  { code:'000001', name:'上证指数', region:'沪' },
  { code:'399001', name:'深证成指', region:'深' },
  { code:'399006', name:'创业板指', region:'创' },
  { code:'000688', name:'科创 50', region:'科' },
  { code:'899050', name:'北证 50', region:'北' },
  { code:'HSI', name:'恒生指数', region:'港' },
  { code:'HSTECH', name:'恒生科技指数', region:'港' },
  { code:'DJIA', name:'道琼斯', region:'美' },
  { code:'IXIC', name:'纳斯达克综指', region:'美' },
  { code:'SPX', name:'标普 500', region:'美' },
  { code:'KOSPI', name:'韩国 KOSPI', region:'韩' },
  { code:'N225', name:'日经 225', region:'日' },
  { code:'GDAXI', name:'德国 DAX', region:'德' },
  { code:'FTSE', name:'英国富时 100', region:'英' },
];
const _stored = JSON.parse(localStorage.getItem(STORAGE_KEY) || 'null');
const _valid = Array.isArray(_stored) ? _stored.filter(s => /^[a-zA-Z0-9._-]+$/.test(s)) : [];
let _storedMarketOrder = [];
try { _storedMarketOrder = JSON.parse(localStorage.getItem(MARKET_ORDER_STORAGE_KEY) || '[]'); }
catch (_) { _storedMarketOrder = []; }
const _marketCodes = MARKET_INDEXES.map(index => index.code);
let marketOrder = [...new Set(
  (Array.isArray(_storedMarketOrder) ? _storedMarketOrder : []).filter(code => _marketCodes.includes(code))
)];
marketOrder.push(..._marketCodes.filter(code => !marketOrder.includes(code)));
const _storedMarketRows = Number(localStorage.getItem(MARKET_ROWS_STORAGE_KEY));
const _storedRefreshInterval = Number(localStorage.getItem(REFRESH_INTERVAL_STORAGE_KEY));
let watchlist = _valid.length ? _valid : [...DEFAULT_STOCKS];
let showListColors = localStorage.getItem(COLOR_STORAGE_KEY) !== 'false';
let marketDefaultRows = [1,2,3].includes(_storedMarketRows) ? _storedMarketRows : 2;
let refreshIntervalMs = REFRESH_INTERVAL_OPTIONS.includes(_storedRefreshInterval) ? _storedRefreshInterval : 5000;
let quoteTimer = null;
let marketTimer = null;
let quoteRequestPending = false;
let marketRequestPending = false;
let lastRawQuoteData = {};
let lastMarketRows = [];
let lastMarketPartial = false;
let marketsExpanded = false;
let marketSortDrag = null;

function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(watchlist)); }

function applyListColorPreference() {
  document.getElementById('stock-table').classList.toggle('market-colors-off', !showListColors);
  document.getElementById('market-grid').classList.toggle('market-colors-off', !showListColors);
  const button = document.getElementById('color-toggle');
  button.setAttribute('aria-pressed', String(showListColors));
  button.textContent = `🎨 行情颜色：${showListColors ? '开' : '关'}`;
}

function toggleListColors() {
  showListColors = !showListColors;
  localStorage.setItem(COLOR_STORAGE_KEY, String(showListColors));
  applyListColorPreference();
}

window.addEventListener('storage', event => {
  if (event.key === COLOR_STORAGE_KEY) {
    showListColors = event.newValue !== 'false';
    applyListColorPreference();
    return;
  }
  if (event.key === REFRESH_INTERVAL_STORAGE_KEY) {
    const interval = Number(event.newValue);
    if (!REFRESH_INTERVAL_OPTIONS.includes(interval)) return;
    refreshIntervalMs = interval;
    document.getElementById('refresh-interval').value = String(interval);
    startAutoRefresh();
  }
});

function marketTag(sym) {
  if (/^sh68[89]/.test(sym)) return '<span class="market-tag tag-kcb">科</span>';
  if (/^sz30[01]/.test(sym)) return '<span class="market-tag tag-cyb">创</span>';
  if (sym.startsWith('sh') || sym.startsWith('sz')) return '<span class="market-tag tag-a">A</span>';
  if (sym.startsWith('hk')) return '<span class="market-tag tag-hk">港</span>';
  if (sym.startsWith('us')) return '<span class="market-tag tag-us">美</span>';
  return '';
}

function fmt(n, d=2) { const v=parseFloat(n); return (isNaN(v)||v===0)?'--':v.toFixed(d); }
function fmtVol(n) { const v=parseFloat(n); if(isNaN(v)||v===0)return'--'; return v>=10000?(v/10000).toFixed(2)+'万':v.toFixed(0); }
function fmtAmt(n) { const v=parseFloat(n); return (isNaN(v)||v===0)?'--':(v/10000).toFixed(2); }
function cls(n) { const v=parseFloat(n); if(isNaN(v)||v===0)return'flat'; return v>0?'up':'down'; }
function sign(n) { return parseFloat(n)>0?'+':''; }

function marketNumber(value, digits=2) {
  const number = Number(value);
  if (!Number.isFinite(number)) return '--';
  return number.toLocaleString('zh-CN', { minimumFractionDigits:digits, maximumFractionDigits:digits });
}

function renderMarkets(rows, partial=false) {
  const byCode = new Map((Array.isArray(rows) ? rows : []).map(item => [String(item.code), item]));
  lastMarketRows = rows;
  lastMarketPartial = partial;
  if (marketSortDrag) return;
  const definitions = new Map(MARKET_INDEXES.map(index => [index.code, index]));
  const markets = marketOrder
    .map(code => definitions.get(code))
    .filter(Boolean)
    .map(index => ({ ...index, data:byCode.get(index.code) }))
    .filter(item => item.data);
  if (!markets.length) throw new Error('empty market data');
  const collapsedCount = marketDefaultRows * MARKET_CARDS_PER_ROW;
  const visibleMarkets = marketsExpanded ? markets : markets.slice(0, collapsedCount);

  document.getElementById('market-grid').innerHTML = visibleMarkets.map(({ code, name, region, data }) => {
    const price = Number(data.price), change = Number(data.change), pct = Number(data.pct);
    const low = data.low == null ? NaN : Number(data.low);
    const high = data.high == null ? NaN : Number(data.high);
    const prevClose = Number(data.prevClose);
    const trend = pct > 0 ? 'up' : pct < 0 ? 'down' : 'flat';
    const position = Number.isFinite(price) && Number.isFinite(low) && Number.isFinite(high) && high > low
      ? Math.max(4, Math.min(100, (price - low) / (high - low) * 100)) : 0;
    const rangeContent = position
      ? `<div class="market-range" title="日内最低 ${marketNumber(low)}，最高 ${marketNumber(high)}">
          <div class="market-range-bar"><div class="market-range-fill" style="width:${position.toFixed(1)}%"></div></div>
          <div class="market-range-labels"><span>低 ${marketNumber(low)}</span><span>高 ${marketNumber(high)}</span></div>
        </div>`
      : `<div class="market-range" title="昨日收盘 ${marketNumber(prevClose)}">
          <div class="market-range-bar"><div class="market-range-fill" style="width:50%"></div></div>
          <div class="market-range-labels"><span>昨收</span><span>${marketNumber(prevClose)}</span></div>
        </div>`;
    return `<article class="market-card ${trend}" data-code="${code}">
      <div class="market-card-top">
        <span class="market-name">${name}</span>
        <span class="market-card-actions">
          <span class="market-region">${region}</span>
          <button class="market-drag-handle" type="button" title="拖动或使用方向键调整 ${name} 的顺序" aria-label="调整 ${name} 的顺序，可拖动或使用方向键">⠿</button>
        </span>
      </div>
      <div class="market-price-row">
        <span class="market-price">${marketNumber(price)}</span>
        <span class="market-pct ${trend}">${sign(pct)}${marketNumber(pct)}%</span>
      </div>
      <div class="market-change">${sign(change)}${marketNumber(change)} 点</div>
      ${rangeContent}
    </article>`;
  }).join('');

  const rising = markets.filter(item => Number(item.data.pct) > 0).length;
  const falling = markets.filter(item => Number(item.data.pct) < 0).length;
  const leader = [...markets].sort((a,b) => Number(b.data.pct) - Number(a.data.pct))[0];
  const timeLabel = new Date().toLocaleTimeString('zh-CN', { hour:'2-digit', minute:'2-digit' });
  document.getElementById('market-summary').innerHTML =
    `<strong>${rising} 涨 · ${falling} 跌</strong>　领涨 ${leader.name} ${sign(leader.data.pct)}${marketNumber(leader.data.pct)}%<br>${partial ? '部分行情延迟 · ' : ''}同步于 ${timeLabel}`;

  const hiddenCount = Math.max(0, markets.length - collapsedCount);
  const actions = document.getElementById('market-overview-actions');
  const expandButton = document.getElementById('market-expand-btn');
  document.getElementById('market-row-count').value = String(marketDefaultRows);
  actions.classList.toggle('visible', hiddenCount > 0);
  expandButton.setAttribute('aria-expanded', String(marketsExpanded));
  expandButton.innerHTML = marketsExpanded
    ? `收起至 ${marketDefaultRows} 行<span class="market-expand-icon">⌄</span>`
    : `展开其余 ${hiddenCount} 个指数<span class="market-expand-icon">⌄</span>`;
}

function setMarketDefaultRows(value) {
  const rows = Number(value);
  if (![1,2,3].includes(rows)) return;
  marketDefaultRows = rows;
  marketsExpanded = false;
  localStorage.setItem(MARKET_ROWS_STORAGE_KEY, String(rows));
  if (lastMarketRows.length) renderMarkets(lastMarketRows, lastMarketPartial);
}

function toggleMarketExpansion() {
  if (!lastMarketRows.length) return;
  marketsExpanded = !marketsExpanded;
  renderMarkets(lastMarketRows, lastMarketPartial);
}

const marketGrid = document.getElementById('market-grid');

function clearMarketDropMarks() {
  marketGrid.querySelectorAll('.drop-before,.drop-after').forEach(card =>
    card.classList.remove('drop-before', 'drop-after')
  );
}

function saveVisibleMarketOrder(visibleCodes) {
  const visibleSet = new Set(visibleCodes);
  const positions = marketOrder
    .map((code, index) => visibleSet.has(code) ? index : -1)
    .filter(index => index >= 0);
  positions.forEach((position, index) => { marketOrder[position] = visibleCodes[index]; });
  localStorage.setItem(MARKET_ORDER_STORAGE_KEY, JSON.stringify(marketOrder));
}

function moveMarketGhost(x, y) {
  if (!marketSortDrag) return;
  marketSortDrag.ghost.style.left = `${x}px`;
  marketSortDrag.ghost.style.top = `${y}px`;
}

marketGrid.addEventListener('pointerdown', event => {
  const handle = event.target.closest('.market-drag-handle');
  const card = handle?.closest('.market-card');
  if (!handle || !card || (event.pointerType === 'mouse' && event.button !== 0)) return;
  event.preventDefault();
  const ghost = document.createElement('div');
  ghost.className = 'market-drag-ghost';
  ghost.textContent = `⠿ ${card.querySelector('.market-name')?.textContent || card.dataset.code}`;
  document.body.appendChild(ghost);
  card.classList.add('sorting-source');
  document.body.classList.add('market-sorting');
  marketSortDrag = { card, handle, ghost, pointerId:event.pointerId, target:null, before:true };
  moveMarketGhost(event.clientX, event.clientY);
  try { handle.setPointerCapture(event.pointerId); } catch (_) {}
});

window.addEventListener('pointermove', event => {
  if (!marketSortDrag || event.pointerId !== marketSortDrag.pointerId) return;
  event.preventDefault();
  moveMarketGhost(event.clientX, event.clientY);
  clearMarketDropMarks();

  const gridRect = marketGrid.getBoundingClientRect();
  if (event.clientX < gridRect.left + 32) marketGrid.scrollLeft -= 12;
  else if (event.clientX > gridRect.right - 32) marketGrid.scrollLeft += 12;

  const hit = document.elementFromPoint(event.clientX, event.clientY)?.closest('.market-card');
  if (!hit || hit === marketSortDrag.card || !marketGrid.contains(hit)) {
    marketSortDrag.target = null;
    return;
  }
  const rect = hit.getBoundingClientRect();
  const nearMiddleRow = Math.abs(event.clientY - (rect.top + rect.height / 2)) < rect.height * .3;
  marketSortDrag.target = hit;
  marketSortDrag.before = nearMiddleRow
    ? event.clientX < rect.left + rect.width / 2
    : event.clientY < rect.top + rect.height / 2;
  hit.classList.add(marketSortDrag.before ? 'drop-before' : 'drop-after');
}, { passive:false });

function finishMarketSort(event, cancelled=false) {
  if (!marketSortDrag || event.pointerId !== marketSortDrag.pointerId) return;
  const { card, handle, ghost, target, before } = marketSortDrag;
  let orderChanged = false;
  if (!cancelled && target) {
    marketGrid.insertBefore(card, before ? target : target.nextSibling);
    const visibleCodes = [...marketGrid.querySelectorAll('.market-card[data-code]')].map(item => item.dataset.code);
    saveVisibleMarketOrder(visibleCodes);
    orderChanged = true;
  }
  clearMarketDropMarks();
  card.classList.remove('sorting-source');
  ghost.remove();
  document.body.classList.remove('market-sorting');
  try { handle.releasePointerCapture(event.pointerId); } catch (_) {}
  marketSortDrag = null;
  if (orderChanged && lastMarketRows.length) renderMarkets(lastMarketRows, lastMarketPartial);
}

window.addEventListener('pointerup', event => finishMarketSort(event));
window.addEventListener('pointercancel', event => finishMarketSort(event, true));

marketGrid.addEventListener('keydown', event => {
  const handle = event.target.closest('.market-drag-handle');
  if (!handle || !['ArrowLeft','ArrowRight','ArrowUp','ArrowDown'].includes(event.key)) return;
  const card = handle.closest('.market-card');
  const visibleCodes = [...marketGrid.querySelectorAll('.market-card[data-code]')].map(item => item.dataset.code);
  const currentIndex = visibleCodes.indexOf(card.dataset.code);
  const delta = event.key === 'ArrowLeft' ? -1
    : event.key === 'ArrowRight' ? 1
      : event.key === 'ArrowUp' ? -MARKET_CARDS_PER_ROW : MARKET_CARDS_PER_ROW;
  const targetIndex = Math.max(0, Math.min(visibleCodes.length - 1, currentIndex + delta));
  if (currentIndex < 0 || targetIndex === currentIndex) return;
  event.preventDefault();
  [visibleCodes[currentIndex], visibleCodes[targetIndex]] = [visibleCodes[targetIndex], visibleCodes[currentIndex]];
  saveVisibleMarketOrder(visibleCodes);
  renderMarkets(lastMarketRows, lastMarketPartial);
  requestAnimationFrame(() => {
    marketGrid.querySelector(`.market-card[data-code="${card.dataset.code}"] .market-drag-handle`)?.focus();
  });
});

async function fetchMarkets() {
  if (marketRequestPending) return;
  marketRequestPending = true;
  try {
    const response = await fetch('/api/markets');
    if (!response.ok) throw new Error('market request failed');
    const payload = await response.json();
    renderMarkets(payload.data, payload.partial);
  } catch (error) {
    console.error('fetchMarkets error:', error);
    document.getElementById('market-summary').textContent = '全球行情暂时不可用，稍后将自动重试';
    const grid = document.getElementById('market-grid');
    if (!grid.querySelector('.market-card:not(.market-card-loading)')) {
      grid.innerHTML = '<div class="market-card market-card-loading">等待行情恢复</div>';
    }
  } finally {
    marketRequestPending = false;
  }
}

function refreshAll() {
  fetchMarkets();
  fetchQuotes();
}

function startAutoRefresh() {
  clearInterval(quoteTimer);
  quoteTimer = document.hidden ? null : setInterval(fetchQuotes, refreshIntervalMs);
}

function startMarketRefresh() {
  clearInterval(marketTimer);
  marketTimer = document.hidden ? null : setInterval(fetchMarkets, GLOBAL_MARKET_REFRESH_INTERVAL);
}

function setRefreshInterval(value) {
  const interval = Number(value);
  if (!REFRESH_INTERVAL_OPTIONS.includes(interval)) return;
  refreshIntervalMs = interval;
  localStorage.setItem(REFRESH_INTERVAL_STORAGE_KEY, String(interval));
  startAutoRefresh();
  fetchQuotes();
}

document.addEventListener('visibilitychange', () => {
  startAutoRefresh();
  startMarketRefresh();
  if (!document.hidden) refreshAll();
});

function parseQuoteText(text) {
  const result = {};
  for (const line of text.split('\n')) {
    const m = line.match(/^v_([a-zA-Z0-9._-]+)="([^"]*)"/);
    if (m) result[m[1]] = m[2].split('~');
  }
  return result;
}

function extractQuote(sym, fields) {
  if (!fields || fields.length < 10) return null;
  return {
    name: fields[1], price: fields[3], prevClose: fields[4],
    open: fields[5], chg: fields[31], pct: fields[32],
    high: fields[33], low: fields[34], volume: fields[36], amount: fields[37],
  };
}

async function fetchQuotes() {
  if (!watchlist.length) { renderEmpty(); return; }
  if (quoteRequestPending) return;
  quoteRequestPending = true;
  try {
    const resp = await fetch(`/api/quote?symbols=${encodeURIComponent(watchlist.join(','))}`);
    if (!resp.ok) throw new Error();
    const data = parseQuoteText(await resp.text());
    renderTable(data);
    setStatus(true);
  } catch(e) {
    console.error('fetchQuotes error:', e);
    setStatus(false);
  } finally {
    quoteRequestPending = false;
  }
}

function setStatus(ok) {
  document.getElementById('dot').className = 'dot' + (ok ? '' : ' offline');
  document.getElementById('status-text').textContent =
    ok ? `上次更新 ${new Date().toLocaleTimeString('zh-CN')}` : '连接失败';
}

function renderEmpty() {
  document.getElementById('tbody').innerHTML =
    '<tr><td colspan="12" class="empty">暂无自选股，请添加</td></tr>';
}

function renderTable(data) {
  if (!watchlist.length) { renderEmpty(); return; }
  lastRawQuoteData = data;
  if (sortDrag) return; // avoid replacing the active row while it is being moved
  document.getElementById('tbody').innerHTML = watchlist.map((sym, i) => {
    const q = extractQuote(sym, data[sym]);
    if (q) lastQuoteData[sym] = q;
    if (!q) return `<tr class="stock-row" data-sym="${sym}" onclick="handleRowClick(event,'${sym}')">
      <td><span class="drag-handle" title="长按拖动排序" aria-label="拖动排序">⠿</span>${marketTag(sym)}<b>${sym.replace(/^(sh|sz|hk|us)/,'')}</b></td>
      <td colspan="10" style="color:#6e7681">数据加载中...</td>
      <td><button class="del-btn" onclick="event.stopPropagation();removeStock('${sym}')">✕</button></td></tr>`;
    const c = cls(q.chg);
    return `<tr class="stock-row" data-sym="${sym}" onclick="handleRowClick(event,'${sym}')">
      <td><span class="drag-handle" title="长按拖动排序" aria-label="拖动排序">⠿</span>${marketTag(sym)}<b>${sym.replace(/^(sh|sz|hk|us)/,'')}</b></td>
      <td>${q.name||sym}</td>
      <td class="${c}" style="font-weight:600">${fmt(q.price)}</td>
      <td class="${c}">${sign(q.chg)}${fmt(q.chg)}</td>
      <td class="${c}">${sign(q.pct)}${fmt(q.pct)}%</td>
      <td>${fmt(q.open)}</td><td>${fmt(q.prevClose)}</td>
      <td class="up">${fmt(q.high)}</td><td class="down">${fmt(q.low)}</td>
      <td>${fmtVol(q.volume)}</td><td>${fmtAmt(q.amount)}</td>
      <td><button class="del-btn" onclick="event.stopPropagation();removeStock('${sym}')">✕</button></td></tr>`;
  }).join('');
}

function addStock(sym) {
  if (!sym) return;
  if (watchlist.includes(sym)) { clearSearch(); return; }
  watchlist.push(sym);
  save();
  clearSearch();
  fetchQuotes();
}

function removeStock(sym) {
  const i = watchlist.indexOf(sym);
  if (i < 0) return;
  watchlist.splice(i, 1);
  save();
  watchlist.length ? fetchQuotes() : renderEmpty();
}

// --- Long-press row sorting (mouse + touch) ---
const tbody = document.getElementById('tbody');
let sortPress = null;
let sortDrag = null;
let suppressRowClickUntil = 0;

function handleRowClick(event, sym) {
  if (Date.now() < suppressRowClickUntil || event.defaultPrevented) return;
  openModal(sym);
}

function clearDropMarks() {
  tbody.querySelectorAll('.drop-before,.drop-after').forEach(row =>
    row.classList.remove('drop-before', 'drop-after')
  );
}

function cancelSortPress() {
  if (!sortPress) return;
  clearTimeout(sortPress.timer);
  sortPress = null;
}

function beginRowSort(press) {
  if (!sortPress || sortPress !== press || !press.row.isConnected) return;
  const cells = press.row.cells;
  const ghost = document.createElement('div');
  ghost.className = 'drag-ghost';
  ghost.innerHTML = `<span class="drag-handle">⠿</span><strong>${cells[1]?.textContent.trim() || press.sym}</strong><span>${press.sym.replace(/^(sh|sz|hk|us)/, '').toUpperCase()}</span>`;
  document.body.appendChild(ghost);
  press.row.classList.add('sorting-source');
  document.body.classList.add('stock-sorting');
  sortDrag = { ...press, ghost, target: null, before: true };
  sortPress = null;
  moveSortGhost(press.x, press.y);
  try { press.row.setPointerCapture(press.pointerId); } catch (_) {}
}

function moveSortGhost(x, y) {
  if (!sortDrag) return;
  sortDrag.ghost.style.left = `${x}px`;
  sortDrag.ghost.style.top = `${y}px`;
}

tbody.addEventListener('pointerdown', event => {
  const row = event.target.closest('tr.stock-row');
  if (!row || event.target.closest('button,a,input') || (event.pointerType === 'mouse' && event.button !== 0)) return;
  cancelSortPress();
  const press = {
    row, sym: row.dataset.sym, pointerId: event.pointerId,
    startX: event.clientX, startY: event.clientY, x: event.clientX, y: event.clientY,
  };
  press.timer = setTimeout(() => beginRowSort(press), 320);
  sortPress = press;
});

window.addEventListener('pointermove', event => {
  if (sortPress && event.pointerId === sortPress.pointerId) {
    sortPress.x = event.clientX;
    sortPress.y = event.clientY;
    if (Math.hypot(event.clientX - sortPress.startX, event.clientY - sortPress.startY) > 7) cancelSortPress();
  }
  if (!sortDrag || event.pointerId !== sortDrag.pointerId) return;
  event.preventDefault();
  moveSortGhost(event.clientX, event.clientY);
  clearDropMarks();
  const hit = document.elementFromPoint(event.clientX, event.clientY)?.closest('tr.stock-row');
  if (!hit || hit === sortDrag.row || !tbody.contains(hit)) {
    sortDrag.target = null;
    return;
  }
  const rect = hit.getBoundingClientRect();
  sortDrag.target = hit;
  sortDrag.before = event.clientY < rect.top + rect.height / 2;
  hit.classList.add(sortDrag.before ? 'drop-before' : 'drop-after');
}, { passive: false });

function finishRowSort(event, cancelled = false) {
  if (sortPress && event.pointerId === sortPress.pointerId) cancelSortPress();
  if (!sortDrag || event.pointerId !== sortDrag.pointerId) return;
  const { row, target, before, ghost } = sortDrag;
  if (!cancelled && target) {
    tbody.insertBefore(row, before ? target : target.nextSibling);
    watchlist = [...tbody.querySelectorAll('tr.stock-row')].map(r => r.dataset.sym);
    save();
    document.getElementById('status-text').textContent = '自选股顺序已保存';
  }
  clearDropMarks();
  row.classList.remove('sorting-source');
  ghost.remove();
  document.body.classList.remove('stock-sorting');
  try { row.releasePointerCapture(event.pointerId); } catch (_) {}
  sortDrag = null;
  suppressRowClickUntil = Date.now() + 450;
}

window.addEventListener('pointerup', event => finishRowSort(event));
window.addEventListener('pointercancel', event => finishRowSort(event, true));

const clearBtn = document.getElementById('search-clear');
const addBtn = document.getElementById('add-btn');
let searchTimer = null;
let ddItems = [];

function setSelected(stock) {

  if (stock) {
    searchInput.value = stock.name;
    addBtn.classList.add('ready');
  } else {
    addBtn.classList.remove('ready');
  }
}

function confirmAdd() {

}

function clearSearch() {
  searchInput.value = '';
  clearBtn.classList.remove('visible');
  setSelected(null);
  closeDropdown();
}

function closeDropdown() {
  dropdown.classList.remove('open');
  ddItems = [];
  ddActive = -1;
}

function openDropdown(html) {
  dropdown.innerHTML = html;
  dropdown.classList.add('open');
}

function highlightItem(idx) {
  const items = dropdown.querySelectorAll('.dd-item');
  items.forEach((el, i) => el.classList.toggle('active', i === idx));
  ddActive = idx;
}

function selectItem(idx) {
  const items = dropdown.querySelectorAll('.dd-item');
  items.forEach((el, i) => el.classList.toggle('selected', i === idx));
  if (ddItems[idx]) setSelected(ddItems[idx]);
  closeDropdown();
}

searchInput.addEventListener('input', () => {
  const q = searchInput.value.trim();
  clearBtn.classList.toggle('visible', q.length > 0);
  setSelected(null);
  clearTimeout(searchTimer);
  if (!q) { closeDropdown(); return; }
  openDropdown('<div class="dd-loading">搜索中...</div>');
  searchTimer = setTimeout(() => doSearch(q), 300);
});

searchInput.addEventListener('keydown', e => {
  if (!dropdown.classList.contains('open')) return;
  if (e.key === 'ArrowDown') {
    e.preventDefault();
    highlightItem(Math.min(ddActive + 1, ddItems.length - 1));
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    highlightItem(Math.max(ddActive - 1, 0));
  } else if (e.key === 'Enter') {
    e.preventDefault();
    if (ddActive >= 0) selectItem(ddActive);
  } else if (e.key === 'Escape') {
    closeDropdown();
  }
});

document.addEventListener('click', e => {
  if (!e.target.closest('.search-row')) closeDropdown();
});

async function doSearch(q) {
  try {
    const resp = await fetch(`/api/search?q=${encodeURIComponent(q)}`);
    if (!resp.ok) throw new Error();
    const results = await resp.json();
    ddItems = results;
    if (!results.length) {
      openDropdown('<div class="dd-empty">未找到相关股票</div>');
      return;
    }
    openDropdown(results.map((r, i) => `
      <div class="dd-item" data-i="${i}" onclick="selectItem(${i})">
        ${marketTag(r.sym)}
        <span class="dd-name">${r.name}</span>
        <span class="dd-code">${r.market} ${r.code}</span>
      </div>`).join(''));
  } catch(e) {
    openDropdown('<div class="dd-empty">搜索失败，请重试</div>');
  }
}

const chartCanvas = document.getElementById('chart-canvas');
const chartInfo = document.getElementById('chart-info');
const chartWindow = document.getElementById('chart-window');
const chartRange = document.getElementById('chart-range');
const chartRangeSelection = document.getElementById('chart-range-selection');
const chartRangeLabel = document.getElementById('chart-range-label');
let chartRequestId = 0;
let chartResizeTimer = null;
const chartState = {
  type: '', data: [], fullData: [], prevClose: 0, date: '',
  ma5: [], ma10: [], fullMa5: [], fullMa10: [], period: '',
  viewStart: 0, viewEnd: -1, defaultStart: 0, defaultEnd: -1,
  hoverIndex: null, pointerY: null, layout: null,
};

async function loadChart(type) {
  if (!modalSym) return;
  const requestId = ++chartRequestId;
  const loading = document.getElementById('chart-loading');
  loading.textContent = '加载中...';
  loading.style.display = 'flex';
  chartInfo.innerHTML = '';
  chartWindow.classList.remove('ready');
  chartState.fullData = [];
  chartState.data = [];
  chartState.layout = null;
  chartState.hoverIndex = null;
  try {
    if (type === 'minute') {
      const r = await fetch(`/api/minute?sym=${modalSym}`);
      if (!r.ok) throw new Error('minute request failed');
      const d = await r.json();
      if (requestId !== chartRequestId || currentTab !== type) return;
      const symKey = Object.keys(d.data || {})[0];
      const stockData = d.data?.[symKey] || {};
      const rows = stockData.data?.data || [];
      const date = stockData.data?.date || '';
      const prevClose = parseFloat(lastQuoteData[modalSym]?.prevClose || stockData.qt?.[symKey]?.[4] || 0);
      drawMinute(chartCanvas, rows, prevClose, date);
    } else if (type === 'minuteK') {
      if (!/^(sh|sz)/.test(modalSym)) throw new Error('minute K line is unavailable for this market');
      const period = currentMinuteKPeriod;
      const r = await fetch(`/api/minute-kline?sym=${modalSym}&period=${period}`);
      if (!r.ok) throw new Error('minute K line request failed');
      const d = await r.json();
      if (requestId !== chartRequestId || currentTab !== type || currentMinuteKPeriod !== period) return;
      const symKey = Object.keys(d.data || {})[0];
      drawKline(chartCanvas, d.data?.[symKey]?.[period] || [], 'minuteK', period);
    } else {
      const r = await fetch(`/api/kline?sym=${modalSym}`);
      if (!r.ok) throw new Error('kline request failed');
      const d = await r.json();
      if (requestId !== chartRequestId || currentTab !== type) return;
      const symKey = Object.keys(d.data || {})[0];
      const key = Object.keys(d.data?.[symKey] || {}).find(k => /day$/i.test(k));
      drawKline(chartCanvas, d.data?.[symKey]?.[key] || [], 'kline');
    }
    if (!chartState.data.length) throw new Error('empty chart data');
    loading.style.display = 'none';
    chartCanvas.style.display = 'block';
  } catch(e) {
    if (requestId !== chartRequestId) return;
    console.error('loadChart error:', e);
    loading.textContent = type === 'minuteK' && !/^(sh|sz)/.test(modalSym || '')
      ? '该市场暂不支持分时 K 线'
      : '图表数据暂不可用';
  }
}

function parseMinuteRows(rows, date) {
  let previousVolume = 0;
  let previousAmount = 0;
  return rows.map(row => {
    const [time, priceRaw, volumeRaw, amountRaw] = String(row).trim().split(/\s+/);
    const price = parseFloat(priceRaw), volume = parseFloat(volumeRaw), amount = parseFloat(amountRaw);
    if (!time || !Number.isFinite(price)) return null;
    const point = {
      date, time, price,
      volume: Number.isFinite(volume) ? volume : 0,
      amount: Number.isFinite(amount) ? amount : 0,
      minuteVolume: Number.isFinite(volume) ? Math.max(0, volume - previousVolume) : 0,
      minuteAmount: Number.isFinite(amount) ? Math.max(0, amount - previousAmount) : 0,
    };
    previousVolume = point.volume;
    previousAmount = point.amount;
    return point;
  }).filter(Boolean);
}

function parseKlineRows(rows) {
  return rows.map(row => {
    const [date, openRaw, closeRaw, highRaw, lowRaw, volumeRaw] = row;
    const open = parseFloat(openRaw), close = parseFloat(closeRaw), high = parseFloat(highRaw);
    const low = parseFloat(lowRaw), volume = parseFloat(volumeRaw);
    if (!date || ![open, close, high, low].every(Number.isFinite)) return null;
    return { date, open, close, high, low, volume: Number.isFinite(volume) ? volume : 0 };
  }).filter(Boolean);
}

function movingAverage(data, period) {
  return data.map((_, i) => {
    if (i < period - 1) return null;
    let total = 0;
    for (let j = i - period + 1; j <= i; j++) total += data[j].close;
    return total / period;
  });
}

function chartMinimumPoints() {
  return chartState.type === 'minute' ? 10 : 5;
}

function initializeChartViewport(defaultSize) {
  const total = chartState.fullData.length;
  const size = Math.max(1, Math.min(total, defaultSize));
  chartState.defaultStart = Math.max(0, total - size);
  chartState.defaultEnd = total - 1;
  setChartViewport(chartState.defaultStart, chartState.defaultEnd);
}

function setChartViewport(start, end, options = {}) {
  const total = chartState.fullData.length;
  if (!total) return;
  const minPoints = Math.min(chartMinimumPoints(), total);
  let nextStart = Math.max(0, Math.min(total - 1, Math.round(start)));
  let nextEnd = Math.max(nextStart, Math.min(total - 1, Math.round(end)));
  if (nextEnd - nextStart + 1 < minPoints) {
    nextEnd = Math.min(total - 1, nextStart + minPoints - 1);
    nextStart = Math.max(0, nextEnd - minPoints + 1);
  }
  chartState.viewStart = nextStart;
  chartState.viewEnd = nextEnd;
  chartState.data = chartState.fullData.slice(nextStart, nextEnd + 1);
  chartState.ma5 = chartState.fullMa5.slice(nextStart, nextEnd + 1);
  chartState.ma10 = chartState.fullMa10.slice(nextStart, nextEnd + 1);
  chartState.hoverIndex = null;
  chartState.pointerY = null;
  updateChartWindow();
  if (options.render !== false) {
    renderChart();
    updateChartInfo(chartState.data.length - 1);
  }
}

function resetChartViewport() {
  setChartViewport(chartState.defaultStart, chartState.defaultEnd);
}

function showAllChartData() {
  if (!chartState.fullData.length) return;
  setChartViewport(0, chartState.fullData.length - 1);
}

function drawMinute(canvas, rows, prevClose, date = '') {
  chartState.type = 'minute';
  chartState.fullData = parseMinuteRows(rows, date);
  chartState.prevClose = prevClose;
  chartState.date = date;
  chartState.period = '';
  chartState.fullMa5 = [];
  chartState.fullMa10 = [];
  initializeChartViewport(chartState.fullData.length);
}

function drawKline(canvas, rows, type = 'kline', period = '') {
  chartState.type = type;
  chartState.fullData = parseKlineRows(rows);
  chartState.prevClose = 0;
  chartState.date = '';
  chartState.period = period;
  chartState.fullMa5 = movingAverage(chartState.fullData, 5);
  chartState.fullMa10 = movingAverage(chartState.fullData, 10);
  initializeChartViewport(type === 'kline' ? 30 : chartState.fullData.length);
}

function prepareChartCanvas() {
  const dpr = window.devicePixelRatio || 1;
  const areaStyle = getComputedStyle(chartCanvas.parentElement);
  const horizontalPadding = parseFloat(areaStyle.paddingLeft) + parseFloat(areaStyle.paddingRight);
  const W = Math.max(280, Math.floor(chartCanvas.parentElement.clientWidth - horizontalPadding));
  const H = 290;
  const pixelW = Math.round(W * dpr), pixelH = Math.round(H * dpr);
  if (chartCanvas.width !== pixelW || chartCanvas.height !== pixelH) {
    chartCanvas.width = pixelW;
    chartCanvas.height = pixelH;
  }
  chartCanvas.style.width = `${W}px`;
  chartCanvas.style.height = `${H}px`;
  const ctx = chartCanvas.getContext('2d');
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  ctx.clearRect(0, 0, W, H);
  return { ctx, W, H };
}

function drawGridLine(ctx, x1, y1, x2, y2) {
  ctx.strokeStyle = '#262c34';
  ctx.lineWidth = 1;
  ctx.setLineDash([]);
  ctx.beginPath();
  ctx.moveTo(x1, y1);
  ctx.lineTo(x2, y2);
  ctx.stroke();
}

function drawMinuteChart(ctx, W, H) {
  const data = chartState.data;
  if (!data.length) return;
  const pad = { l: 54, r: 54 };
  const plotLeft = pad.l, plotRight = W - pad.r, cw = plotRight - plotLeft;
  const priceTop = 8, priceH = 184, volTop = 216, volH = 46;
  const prices = data.map(p => p.price);
  const prev = chartState.prevClose;
  let priceMin, priceMax;
  if (prev > 0) {
    const maxDiff = Math.max(...prices.map(v => Math.abs(v - prev)), prev * .0015);
    priceMin = prev - maxDiff * 1.08;
    priceMax = prev + maxDiff * 1.08;
  } else {
    const rawMin = Math.min(...prices), rawMax = Math.max(...prices);
    const margin = Math.max((rawMax - rawMin) * .08, rawMax * .001);
    priceMin = rawMin - margin;
    priceMax = rawMax + margin;
  }
  const range = priceMax - priceMin || 1;
  const py = value => priceTop + (priceMax - value) / range * priceH;
  const xFor = index => plotLeft + (data.length === 1 ? 0 : index / (data.length - 1)) * cw;
  const valueForY = y => priceMax - (y - priceTop) / priceH * range;

  ctx.fillStyle = '#0d1117';
  ctx.fillRect(0, 0, W, H);
  ctx.font = '10px ui-monospace, monospace';
  for (let i = 0; i <= 4; i++) {
    const ratio = i / 4, y = priceTop + ratio * priceH;
    const value = priceMax - ratio * range;
    drawGridLine(ctx, plotLeft, y, plotRight, y);
    ctx.fillStyle = '#8b949e';
    ctx.textAlign = 'right';
    ctx.fillText(value.toFixed(2), plotLeft - 5, y + 3);
    ctx.textAlign = 'left';
    const pct = prev > 0 ? (value - prev) / prev * 100 : 0;
    ctx.fillStyle = pct > 0 ? '#f85149' : pct < 0 ? '#3fb950' : '#8b949e';
    ctx.fillText(`${pct > 0 ? '+' : ''}${pct.toFixed(2)}%`, plotRight + 5, y + 3);
  }

  const xIndexes = [...new Set([0, Math.round((data.length - 1) * .25), Math.round((data.length - 1) * .5), Math.round((data.length - 1) * .75), data.length - 1])];
  xIndexes.forEach((index, tickIndex) => {
    const x = xFor(index);
    drawGridLine(ctx, x, priceTop, x, volTop + volH);
    ctx.fillStyle = '#8b949e';
    ctx.textAlign = tickIndex === 0 ? 'left' : tickIndex === xIndexes.length - 1 ? 'right' : 'center';
    ctx.fillText(formatTime(data[index].time), x, H - 8);
  });

  if (prev > 0) {
    ctx.strokeStyle = '#6e7681';
    ctx.setLineDash([4, 4]);
    ctx.beginPath();
    ctx.moveTo(plotLeft, py(prev));
    ctx.lineTo(plotRight, py(prev));
    ctx.stroke();
    ctx.setLineDash([]);
  }

  const latestUp = data[data.length - 1].price >= (prev || data[0].price);
  const lineColor = latestUp ? '#f85149' : '#3fb950';
  const gradient = ctx.createLinearGradient(0, priceTop, 0, priceTop + priceH);
  gradient.addColorStop(0, lineColor + '35');
  gradient.addColorStop(1, lineColor + '03');
  ctx.beginPath();
  data.forEach((point, i) => {
    const x = xFor(i), y = py(point.price);
    i ? ctx.lineTo(x, y) : ctx.moveTo(x, y);
  });
  ctx.lineTo(plotRight, priceTop + priceH);
  ctx.lineTo(plotLeft, priceTop + priceH);
  ctx.closePath();
  ctx.fillStyle = gradient;
  ctx.fill();
  ctx.beginPath();
  data.forEach((point, i) => {
    const x = xFor(i), y = py(point.price);
    i ? ctx.lineTo(x, y) : ctx.moveTo(x, y);
  });
  ctx.strokeStyle = lineColor;
  ctx.lineWidth = 1.5;
  ctx.stroke();

  const maxVolume = Math.max(...data.map(p => p.minuteVolume), 1);
  const barW = Math.max(1, Math.min(5, cw / data.length * .7));
  ctx.fillStyle = '#8b949e';
  ctx.textAlign = 'right';
  ctx.fillText('成交量', plotLeft - 5, volTop + 10);
  data.forEach((point, i) => {
    const height = point.minuteVolume / maxVolume * volH;
    const prior = i ? data[i - 1].price : prev;
    ctx.fillStyle = point.price >= prior ? '#f8514966' : '#3fb95066';
    ctx.fillRect(xFor(i) - barW / 2, volTop + volH - height, barW, height);
  });
  drawGridLine(ctx, plotLeft, volTop, plotRight, volTop);

  chartState.layout = { W, H, plotLeft, plotRight, cw, priceTop, priceH, volTop, volH, priceMin, priceMax, xFor, py, valueForY };
}

function drawAverageLine(ctx, values, xFor, py, color) {
  ctx.beginPath();
  let started = false;
  values.forEach((value, i) => {
    if (value == null) return;
    const x = xFor(i), y = py(value);
    if (!started) { ctx.moveTo(x, y); started = true; }
    else ctx.lineTo(x, y);
  });
  ctx.strokeStyle = color;
  ctx.lineWidth = 1.2;
  ctx.stroke();
}

function drawKlineChart(ctx, W, H) {
  const data = chartState.data;
  if (!data.length) return;
  const pad = { l: 54, r: 12 };
  const plotLeft = pad.l, plotRight = W - pad.r, cw = plotRight - plotLeft;
  const priceTop = 18, priceH = 174, volTop = 216, volH = 46;
  const rawMin = Math.min(...data.map(p => p.low)), rawMax = Math.max(...data.map(p => p.high));
  const margin = Math.max((rawMax - rawMin) * .05, rawMax * .002);
  const priceMin = rawMin - margin, priceMax = rawMax + margin, range = priceMax - priceMin || 1;
  const step = cw / data.length;
  const xFor = index => plotLeft + (index + .5) * step;
  const py = value => priceTop + (priceMax - value) / range * priceH;
  const valueForY = y => priceMax - (y - priceTop) / priceH * range;

  ctx.fillStyle = '#0d1117';
  ctx.fillRect(0, 0, W, H);
  ctx.font = '10px ui-monospace, monospace';
  for (let i = 0; i <= 4; i++) {
    const ratio = i / 4, y = priceTop + ratio * priceH;
    const value = priceMax - ratio * range;
    drawGridLine(ctx, plotLeft, y, plotRight, y);
    ctx.fillStyle = '#8b949e';
    ctx.textAlign = 'right';
    ctx.fillText(value.toFixed(2), plotLeft - 5, y + 3);
  }

  const xIndexes = [...new Set([0, Math.round((data.length - 1) * .25), Math.round((data.length - 1) * .5), Math.round((data.length - 1) * .75), data.length - 1])];
  xIndexes.forEach((index, tickIndex) => {
    const x = xFor(index);
    drawGridLine(ctx, x, priceTop, x, volTop + volH);
    ctx.fillStyle = '#8b949e';
    ctx.textAlign = tickIndex === 0 ? 'left' : tickIndex === xIndexes.length - 1 ? 'right' : 'center';
    ctx.fillText(klineAxisLabel(data[index].date), x, H - 8);
  });

  const barW = Math.max(2, Math.min(13, step * .62));
  data.forEach((point, i) => {
    const x = xFor(i), up = point.close >= point.open;
    const color = up ? '#f85149' : '#3fb950';
    ctx.strokeStyle = color;
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(x, py(point.high));
    ctx.lineTo(x, py(point.low));
    ctx.stroke();
    const bodyTop = py(Math.max(point.open, point.close));
    const bodyBottom = py(Math.min(point.open, point.close));
    ctx.fillStyle = color;
    ctx.fillRect(x - barW / 2, bodyTop, barW, Math.max(1, bodyBottom - bodyTop));
  });

  drawAverageLine(ctx, chartState.ma5, xFor, py, '#e3b341');
  drawAverageLine(ctx, chartState.ma10, xFor, py, '#bc8cff');
  ctx.font = '10px ui-monospace, monospace';
  ctx.textAlign = 'left';
  ctx.fillStyle = '#e3b341';
  ctx.fillText('MA5', plotLeft, 11);
  ctx.fillStyle = '#bc8cff';
  ctx.fillText('MA10', plotLeft + 34, 11);

  const maxVolume = Math.max(...data.map(p => p.volume), 1);
  ctx.fillStyle = '#8b949e';
  ctx.textAlign = 'right';
  ctx.fillText('成交量', plotLeft - 5, volTop + 10);
  data.forEach((point, i) => {
    const height = point.volume / maxVolume * volH;
    ctx.fillStyle = point.close >= point.open ? '#f8514966' : '#3fb95066';
    ctx.fillRect(xFor(i) - barW / 2, volTop + volH - height, barW, height);
  });
  drawGridLine(ctx, plotLeft, volTop, plotRight, volTop);

  chartState.layout = { W, H, plotLeft, plotRight, cw, priceTop, priceH, volTop, volH, priceMin, priceMax, xFor, py, valueForY };
}

function renderChart() {
  const { ctx, W, H } = prepareChartCanvas();
  chartState.type === 'minute' ? drawMinuteChart(ctx, W, H) : drawKlineChart(ctx, W, H);
  if (chartState.hoverIndex != null) drawCrosshair(ctx);
}

function drawBadge(ctx, text, centerX, top, maxW) {
  ctx.font = '10px ui-monospace, monospace';
  const width = Math.min(maxW, Math.max(46, ctx.measureText(text).width + 12));
  const left = Math.max(1, Math.min(centerX - width / 2, chartState.layout.W - width - 1));
  ctx.fillStyle = '#30363d';
  ctx.fillRect(left, top, width, 18);
  ctx.fillStyle = '#e6edf3';
  ctx.textAlign = 'center';
  ctx.fillText(text, left + width / 2, top + 12);
}

function drawCrosshair(ctx) {
  const layout = chartState.layout;
  const index = Math.max(0, Math.min(chartState.data.length - 1, chartState.hoverIndex));
  const point = chartState.data[index];
  const x = layout.xFor(index), y = chartState.pointerY;
  ctx.save();
  ctx.strokeStyle = '#c9d1d1aa';
  ctx.lineWidth = 1;
  ctx.setLineDash([3, 3]);
  ctx.beginPath();
  ctx.moveTo(x, layout.priceTop);
  ctx.lineTo(x, layout.volTop + layout.volH);
  ctx.stroke();
  if (y >= layout.priceTop && y <= layout.priceTop + layout.priceH) {
    ctx.beginPath();
    ctx.moveTo(layout.plotLeft, y);
    ctx.lineTo(layout.plotRight, y);
    ctx.stroke();
    drawBadge(ctx, layout.valueForY(y).toFixed(2), layout.plotRight - 28, y - 9, 58);
  }
  ctx.setLineDash([]);
  const markerY = layout.py(chartState.type === 'minute' ? point.price : point.close);
  ctx.fillStyle = '#e6edf3';
  ctx.beginPath();
  ctx.arc(x, markerY, 3, 0, Math.PI * 2);
  ctx.fill();
  const xText = chartState.type === 'minute'
    ? formatTime(point.time)
    : chartState.type === 'minuteK' ? formatKlineTimestamp(point.date) : point.date;
  drawBadge(ctx, xText, x, layout.volTop + layout.volH + 3, chartState.type === 'minute' ? 58 : 106);
  ctx.restore();
}

function chartNumber(value, digits = 2) {
  return Number.isFinite(value) ? value.toFixed(digits) : '--';
}

function formatTime(value) {
  const str = String(value || '').padStart(4, '0');
  return `${str.slice(0, 2)}:${str.slice(2, 4)}`;
}

function formatTradeDate(value) {
  const str = String(value || '');
  return /^\d{8}$/.test(str) ? `${str.slice(0,4)}-${str.slice(4,6)}-${str.slice(6,8)}` : str;
}

function formatKlineTimestamp(value) {
  const str = String(value || '');
  if (!/^\d{12}$/.test(str)) return str;
  return `${str.slice(4,6)}-${str.slice(6,8)} ${str.slice(8,10)}:${str.slice(10,12)}`;
}

function klineAxisLabel(value) {
  return chartState.type === 'minuteK' ? formatKlineTimestamp(value).slice(6) : String(value || '').slice(5);
}

function chartPointTime(point) {
  if (!point) return '';
  if (chartState.type === 'minute') return `${formatTradeDate(point.date)} ${formatTime(point.time)}`.trim();
  if (chartState.type === 'minuteK') return formatKlineTimestamp(point.date);
  return point.date;
}

function updateChartWindow() {
  const total = chartState.fullData.length;
  if (!total || chartState.viewEnd < chartState.viewStart) {
    chartWindow.classList.remove('ready');
    return;
  }
  chartWindow.classList.add('ready');
  const denominator = Math.max(1, total - 1);
  const left = chartState.viewStart / denominator * 100;
  const right = chartState.viewEnd / denominator * 100;
  chartRangeSelection.style.left = `${left}%`;
  chartRangeSelection.style.width = `${Math.max(0, right - left)}%`;
  const first = chartState.fullData[chartState.viewStart];
  const last = chartState.fullData[chartState.viewEnd];
  chartRangeLabel.textContent = `${chartPointTime(first)} — ${chartPointTime(last)} · ${chartState.viewEnd - chartState.viewStart + 1}/${total}`;
}

function zoomChartToCount(targetCount, anchorRatio = .5) {
  const total = chartState.fullData.length;
  if (!total) return;
  const currentCount = chartState.viewEnd - chartState.viewStart + 1;
  const ratio = Math.max(0, Math.min(1, anchorRatio));
  const anchor = chartState.viewStart + ratio * Math.max(0, currentCount - 1);
  zoomChartAround(targetCount, anchor, ratio);
}

function zoomChartAround(targetCount, anchor, anchorRatio = .5) {
  const total = chartState.fullData.length;
  if (!total) return;
  const minPoints = Math.min(chartMinimumPoints(), total);
  const count = Math.max(minPoints, Math.min(total, Math.round(targetCount)));
  const ratio = Math.max(0, Math.min(1, anchorRatio));
  let start = Math.round(anchor - ratio * Math.max(0, count - 1));
  start = Math.max(0, Math.min(total - count, start));
  setChartViewport(start, start + count - 1);
}

function panChartBy(offset) {
  const total = chartState.fullData.length;
  const count = chartState.viewEnd - chartState.viewStart + 1;
  if (!total || count >= total) return;
  const start = Math.max(0, Math.min(total - count, chartState.viewStart + Math.round(offset)));
  setChartViewport(start, start + count - 1);
}

let rangeDrag = null;

chartRange.addEventListener('pointerdown', event => {
  if (!chartState.fullData.length || event.button > 0) return;
  event.preventDefault();
  const total = chartState.fullData.length;
  const rect = chartRange.getBoundingClientRect();
  const edge = event.target.closest('.chart-range-handle')?.dataset.edge;
  const mode = edge || 'move';
  if (!event.target.closest('.chart-range-selection')) {
    const count = chartState.viewEnd - chartState.viewStart + 1;
    const center = (event.clientX - rect.left) / rect.width * Math.max(0, total - 1);
    let start = Math.round(center - (count - 1) / 2);
    start = Math.max(0, Math.min(total - count, start));
    setChartViewport(start, start + count - 1);
  }
  rangeDrag = {
    mode, pointerId: event.pointerId, startX: event.clientX,
    start: chartState.viewStart, end: chartState.viewEnd, width: rect.width,
  };
  try { chartRange.setPointerCapture(event.pointerId); } catch (_) {}
});

chartRange.addEventListener('pointermove', event => {
  if (!rangeDrag || event.pointerId !== rangeDrag.pointerId) return;
  event.preventDefault();
  const total = chartState.fullData.length;
  const minPoints = Math.min(chartMinimumPoints(), total);
  const delta = Math.round((event.clientX - rangeDrag.startX) / Math.max(1, rangeDrag.width) * Math.max(0, total - 1));
  if (rangeDrag.mode === 'start') {
    const start = Math.max(0, Math.min(rangeDrag.end - minPoints + 1, rangeDrag.start + delta));
    setChartViewport(start, rangeDrag.end);
  } else if (rangeDrag.mode === 'end') {
    const end = Math.min(total - 1, Math.max(rangeDrag.start + minPoints - 1, rangeDrag.end + delta));
    setChartViewport(rangeDrag.start, end);
  } else {
    const count = rangeDrag.end - rangeDrag.start + 1;
    const start = Math.max(0, Math.min(total - count, rangeDrag.start + delta));
    setChartViewport(start, start + count - 1);
  }
});

function endRangeDrag(event) {
  if (!rangeDrag || event.pointerId !== rangeDrag.pointerId) return;
  try { chartRange.releasePointerCapture(event.pointerId); } catch (_) {}
  rangeDrag = null;
}

chartRange.addEventListener('pointerup', endRangeDrag);
chartRange.addEventListener('pointercancel', endRangeDrag);

function chartVolume(value) {
  if (!Number.isFinite(value)) return '--';
  if (value >= 100000000) return `${(value / 100000000).toFixed(2)}亿`;
  if (value >= 10000) return `${(value / 10000).toFixed(2)}万`;
  return Math.round(value).toLocaleString('zh-CN');
}

function chartAmount(value) {
  if (!Number.isFinite(value)) return '--';
  if (value >= 100000000) return `${(value / 100000000).toFixed(2)}亿元`;
  if (value >= 10000) return `${(value / 10000).toFixed(2)}万元`;
  return `${Math.round(value).toLocaleString('zh-CN')}元`;
}

function infoItem(label, value, tone = '') {
  return `<span class="${tone}"><b>${label}</b>${value}</span>`;
}

function updateChartInfo(index) {
  const point = chartState.data[index];
  if (!point) { chartInfo.innerHTML = ''; return; }
  if (chartState.type === 'minute') {
    const pct = chartState.prevClose > 0 ? (point.price - chartState.prevClose) / chartState.prevClose * 100 : 0;
    const tone = pct > 0 ? 'up' : pct < 0 ? 'down' : 'flat';
    chartInfo.innerHTML = [
      infoItem('时间', `${formatTradeDate(point.date)} ${formatTime(point.time)}`),
      infoItem('价格', chartNumber(point.price), tone),
      infoItem('涨跌幅', `${pct > 0 ? '+' : ''}${chartNumber(pct)}%`, tone),
      infoItem('分钟量', `${chartVolume(point.minuteVolume)}手`),
      infoItem('累计量', `${chartVolume(point.volume)}手`),
      infoItem('成交额', chartAmount(point.amount)),
    ].join('');
  } else {
    const absoluteIndex = chartState.viewStart + index;
    const previousClose = absoluteIndex > 0 ? chartState.fullData[absoluteIndex - 1].close : point.open;
    const pct = previousClose ? (point.close - previousClose) / previousClose * 100 : 0;
    const tone = pct > 0 ? 'up' : pct < 0 ? 'down' : 'flat';
    chartInfo.innerHTML = [
      infoItem(chartState.type === 'minuteK' ? '时间' : '日期', chartState.type === 'minuteK' ? formatKlineTimestamp(point.date) : point.date),
      infoItem('开', chartNumber(point.open)),
      infoItem('高', chartNumber(point.high), 'up'),
      infoItem('低', chartNumber(point.low), 'down'),
      infoItem('收', chartNumber(point.close), tone),
      infoItem('涨跌', `${pct > 0 ? '+' : ''}${chartNumber(pct)}%`, tone),
      infoItem('量', `${chartVolume(point.volume)}手`),
      chartState.ma5[index] == null ? '' : infoItem('MA5', chartNumber(chartState.ma5[index])),
      chartState.ma10[index] == null ? '' : infoItem('MA10', chartNumber(chartState.ma10[index])),
    ].join('');
  }
}

function chartRatioAtClientX(clientX) {
  const rect = chartCanvas.getBoundingClientRect();
  const x = (clientX - rect.left) * chartState.layout.W / rect.width;
  const { plotLeft, plotRight } = chartState.layout;
  return Math.max(0, Math.min(1, (x - plotLeft) / (plotRight - plotLeft)));
}

function updateChartHover(event) {
  if (!chartState.layout || !chartState.data.length) return;
  const rect = chartCanvas.getBoundingClientRect();
  const x = (event.clientX - rect.left) * chartState.layout.W / rect.width;
  const y = (event.clientY - rect.top) * chartState.layout.H / rect.height;
  const { plotLeft, plotRight } = chartState.layout;
  if (x < plotLeft || x > plotRight) return;
  const ratio = chartRatioAtClientX(event.clientX);
  chartState.hoverIndex = chartState.type === 'minute'
    ? Math.round(ratio * (chartState.data.length - 1))
    : Math.min(chartState.data.length - 1, Math.floor(ratio * chartState.data.length));
  chartState.pointerY = y;
  renderChart();
  updateChartInfo(chartState.hoverIndex);
}

const chartPointers = new Map();
let chartGesture = null;

function beginChartPan(pointer) {
  chartGesture = {
    mode: 'pan', pointerId: pointer.pointerId, startX: pointer.clientX,
    start: chartState.viewStart, end: chartState.viewEnd, moved: false,
  };
}

function beginChartPinch() {
  const points = [...chartPointers.values()];
  if (points.length < 2) return;
  const distance = Math.max(1, Math.hypot(points[0].clientX - points[1].clientX, points[0].clientY - points[1].clientY));
  const midpoint = (points[0].clientX + points[1].clientX) / 2;
  const ratio = chartRatioAtClientX(midpoint);
  const count = chartState.viewEnd - chartState.viewStart + 1;
  chartGesture = {
    mode: 'pinch', startDistance: distance, startCount: count,
    anchor: chartState.viewStart + ratio * Math.max(0, count - 1), moved: false,
  };
}

chartCanvas.addEventListener('pointerdown', event => {
  if (!chartState.layout || !chartState.data.length || event.button > 0) return;
  event.preventDefault();
  chartPointers.set(event.pointerId, { pointerId: event.pointerId, clientX: event.clientX, clientY: event.clientY });
  try { chartCanvas.setPointerCapture(event.pointerId); } catch (_) {}
  chartCanvas.classList.add('panning');
  if (chartPointers.size === 1) beginChartPan(chartPointers.get(event.pointerId));
  else beginChartPinch();
});

chartCanvas.addEventListener('pointermove', event => {
  if (!chartState.layout || !chartState.data.length) return;
  if (!chartPointers.has(event.pointerId)) {
    if (event.pointerType === 'mouse') updateChartHover(event);
    return;
  }
  event.preventDefault();
  chartPointers.set(event.pointerId, { pointerId: event.pointerId, clientX: event.clientX, clientY: event.clientY });
  if (chartPointers.size >= 2) {
    if (chartGesture?.mode !== 'pinch') beginChartPinch();
    const points = [...chartPointers.values()];
    const distance = Math.max(1, Math.hypot(points[0].clientX - points[1].clientX, points[0].clientY - points[1].clientY));
    const midpoint = (points[0].clientX + points[1].clientX) / 2;
    chartGesture.moved = true;
    zoomChartAround(chartGesture.startCount * chartGesture.startDistance / distance, chartGesture.anchor, chartRatioAtClientX(midpoint));
    return;
  }
  if (chartGesture?.mode !== 'pan' || chartGesture.pointerId !== event.pointerId) return;
  const rect = chartCanvas.getBoundingClientRect();
  const plotWidth = rect.width * (chartState.layout.plotRight - chartState.layout.plotLeft) / chartState.layout.W;
  const count = chartGesture.end - chartGesture.start + 1;
  const delta = Math.round(-(event.clientX - chartGesture.startX) / Math.max(1, plotWidth) * count);
  if (Math.abs(event.clientX - chartGesture.startX) > 3) chartGesture.moved = true;
  const total = chartState.fullData.length;
  const start = Math.max(0, Math.min(total - count, chartGesture.start + delta));
  setChartViewport(start, start + count - 1);
});

chartCanvas.addEventListener('pointerleave', event => {
  if (event.pointerType !== 'mouse' || chartPointers.size) return;
  chartState.hoverIndex = null;
  chartState.pointerY = null;
  renderChart();
  updateChartInfo(chartState.data.length - 1);
});

function endChartPointer(event) {
  if (!chartPointers.has(event.pointerId)) return;
  const wasTap = chartPointers.size === 1 && chartGesture?.mode === 'pan' && !chartGesture.moved;
  chartPointers.delete(event.pointerId);
  try { chartCanvas.releasePointerCapture(event.pointerId); } catch (_) {}
  if (chartPointers.size === 1) beginChartPan([...chartPointers.values()][0]);
  else if (!chartPointers.size) {
    chartGesture = null;
    chartCanvas.classList.remove('panning');
  }
  if (wasTap) updateChartHover(event);
}

chartCanvas.addEventListener('pointerup', endChartPointer);
chartCanvas.addEventListener('pointercancel', endChartPointer);

chartCanvas.addEventListener('wheel', event => {
  if (!chartState.layout || !chartState.fullData.length) return;
  event.preventDefault();
  const currentCount = chartState.viewEnd - chartState.viewStart + 1;
  const scale = Math.exp(event.deltaY * .0018);
  zoomChartToCount(currentCount * scale, chartRatioAtClientX(event.clientX));
}, { passive: false });

chartCanvas.addEventListener('dblclick', event => {
  event.preventDefault();
  resetChartViewport();
});

window.addEventListener('resize', () => {
  clearTimeout(chartResizeTimer);
  chartResizeTimer = setTimeout(() => {
    if (document.getElementById('modal-mask').classList.contains('open') && chartState.data.length) renderChart();
  }, 100);
});
applyListColorPreference();
document.getElementById('market-row-count').value = String(marketDefaultRows);
document.getElementById('refresh-interval').value = String(refreshIntervalMs);
startAutoRefresh();
startMarketRefresh();
refreshAll(); // initial load

// --- Float Window ---
let floatWindow = null;

function openFloatWindow() {
  if (floatWindow && !floatWindow.closed) {
    floatWindow.focus();
    return;
  }
  floatWindow = window.open(
    '/float.html',
    'stockFloat',
    'width=500,height=400,left=100,top=100,resizable=yes,scrollbars=no'
  );
}
</script>
</body>
